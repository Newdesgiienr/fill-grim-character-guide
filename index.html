<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FILL GRIM 캐릭터 가이드</title>
<style>
  :root {
    --bg: #f2f5f9;
    --card: #ffffff;
    --line: #d6dde8;
    --line-soft: #e7ecf3;
    --text: #12284f;
    --muted: #63728a;
    --navy: #29324a;
    --navy-2: #34405d;
    --accent: #f28c54;
    --accent-soft: #fff0e7;
    --shadow: 0 12px 24px rgba(15,23,42,.08);
    --radius: 22px;
    --gi: linear-gradient(145deg,#3b82f6,#1d4ed8);
    --seung: linear-gradient(145deg,#10b981,#047857);
    --jeon: linear-gradient(145deg,#f59e0b,#b45309);
    --gyeol: linear-gradient(145deg,#8b5cf6,#6d28d9);
  }
  * { box-sizing: border-box; }
  html,body { margin:0; padding:0; background:var(--bg); color:var(--text); font-family: Inter, Pretendard, 'Noto Sans KR', system-ui, sans-serif; }
  button { font: inherit; }
  .page { width:min(100% - 28px, 1540px); margin:0 auto; padding:14px 0 28px; }
  .panel { background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); }
  .top-card { display:flex; justify-content:space-between; align-items:center; gap:18px; padding:18px 22px; }
  .brand { display:flex; align-items:center; gap:18px; min-width:0; }
  .logo { width:68px; height:68px; border-radius:18px; display:grid; place-items:center; text-align:center; font-size:17px; font-weight:950; line-height:1.05; color:#fff; background:linear-gradient(145deg,#334155,#111827); box-shadow: inset 0 1px 0 rgba(255,255,255,.18); }
  h1 { margin:0; font-size:31px; line-height:1.1; letter-spacing:-.04em; }
  .brand-sub { margin-top:7px; color:var(--muted); font-size:14px; font-weight:700; }

  .character-switcher { display:flex; gap:10px; flex-wrap:wrap; }
  .char-btn { min-width:104px; height:48px; border:1px solid var(--line); border-radius:15px; padding:0 16px; display:flex; align-items:center; justify-content:center; gap:10px; background:#fff; color:var(--text); font-weight:900; cursor:pointer; transition:.18s ease; }
  .char-btn:hover { transform:translateY(-1px); box-shadow:0 8px 16px rgba(15,23,42,.08); }
  .char-btn.active { background:#22293d; color:#fff; border-color:#22293d; }
  .char-badge { width:28px; height:28px; border-radius:10px; display:grid; place-items:center; color:#fff; font-size:13px; font-weight:950; }
  .char-btn[data-character="mime"] .char-badge { background:linear-gradient(145deg,#60a5fa,#2563eb); }
  .char-btn[data-character="neve"] .char-badge { background:linear-gradient(145deg,#8b5cf6,#6d28d9); }

  .character-card { margin-top:18px; padding:17px 20px 0; border-radius:var(--radius); overflow:visible; }
  .character-main { display:flex; align-items:center; justify-content:space-between; gap:22px; padding-bottom:16px; }
  .character-identity { display:flex; align-items:center; gap:16px; min-width:0; }
  .portrait { width:78px; height:78px; flex:0 0 auto; position:relative; overflow:hidden; border-radius:17px; background:linear-gradient(145deg,#8b5cf6,#5b21b6); box-shadow:0 9px 20px rgba(124,58,237,.15); }
  .portrait.mime { background:linear-gradient(145deg,#60a5fa,#0ea5e9); }
  .portrait img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; object-position:50% 50%; }
  .character-title-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .character-name { font-size:27px; font-weight:950; letter-spacing:-.04em; }
  .badge { display:inline-flex; align-items:center; min-height:30px; padding:0 11px; border-radius:999px; font-size:12px; font-weight:900; white-space:nowrap; }
  .badge.role { color:#1d4ed8; background:#eaf2ff; }
  .badge.hp { color:#b91c1c; background:#feecec; }
  .character-desc { margin:6px 0 0; color:var(--muted); font-size:13px; font-weight:700; }

  .skill-shortcuts { display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end; }
  .skill-shortcut { width:50px; height:50px; padding:0; position:relative; border:2px solid transparent; border-radius:13px; color:#fff; font-weight:950; cursor:pointer; box-shadow: inset 0 0 0 1px rgba(255,255,255,.22), 0 7px 14px rgba(15,23,42,.09); transition:transform .15s ease, border-color .15s ease, box-shadow .15s ease; }
  .skill-shortcut:hover { transform:translateY(-2px); }
  .skill-shortcut.active { border-color:var(--accent); transform:translateY(-2px); box-shadow:0 0 0 3px rgba(242,140,84,.16), 0 9px 18px rgba(15,23,42,.13); }
  .skill-shortcut small { position:absolute; right:3px; bottom:3px; min-width:17px; height:17px; padding:0 4px; display:grid; place-items:center; border-radius:999px; background:rgba(0,0,0,.5); color:#fff; font-size:9px; }
  .skill-shortcut.gi { background:var(--gi); }
  .skill-shortcut.seung { background:var(--seung); }
  .skill-shortcut.jeon { background:var(--jeon); }
  .skill-shortcut.gyeol { background:var(--gyeol); }

  .main-tabs { margin:0 -20px; display:flex; min-height:58px; border-top:1px solid var(--line); border-radius:0 0 var(--radius) var(--radius); overflow:hidden; background:linear-gradient(180deg,#f7f9fc,#f0f4fa); }
  .main-tab { flex:0 0 auto; min-width:160px; padding:0 28px; border:0; background:transparent; color:var(--text); font-weight:900; cursor:pointer; transition:background .16s ease, color .16s ease; border-top:3px solid transparent; }
  .main-tab:hover { background:rgba(255,255,255,.64); }
  .main-tab.active { background:#fff; color:#dc6f42; border-top-color:var(--accent); }

  .section-titlebar { position:relative; min-height:92px; margin-top:18px; padding:0 28px; border-radius:18px 18px 4px 4px; display:flex; align-items:center; justify-content:space-between; gap:20px; background:linear-gradient(135deg,var(--navy),var(--navy-2)); color:#fff; box-shadow:0 12px 24px rgba(15,23,42,.13); overflow:visible; }
  .section-heading { display:flex; align-items:center; min-width:0; z-index:2; }
  .section-heading::before { content:''; width:3px; height:32px; margin-right:14px; border-radius:999px; background:var(--accent); flex:0 0 auto; }
  .section-title { font-size:21px; font-weight:950; letter-spacing:-.03em; }
  .section-subtitle { margin-left:10px; color:#d9e0eb; font-size:13px; font-weight:800; }

  .content-card { border-top:0; border-radius:0 0 var(--radius) var(--radius); padding:18px; }
  /* Illustration gallery */
.art-grid { display: grid; grid-template-columns: repeat(5,minmax(0,1fr)); gap: 16px; }
    .art-card {
      appearance: none; width: 100%; padding: 0; border: 1px solid #3a4357;
      border-radius: 17px; overflow: hidden; background: #05070c; color: #fff;
      position: relative; aspect-ratio: 9 / 16; cursor: pointer; isolation: isolate;
      box-shadow: 0 10px 20px rgba(15,23,42,.10);
      transition: transform .22s ease, border-color .22s ease, box-shadow .22s ease;
    }
    .art-card::before {
      content: ''; position: absolute; inset: -18%; z-index: -1;
      background:
        radial-gradient(ellipse at 50% 36%, rgba(255,255,224,1) 0 8%, rgba(255,229,103,.98) 19%, rgba(255,184,38,.78) 34%, rgba(255,157,24,.34) 49%, transparent 69%),
        linear-gradient(105deg, transparent 0 35%, rgba(255,225,112,.16) 46%, rgba(255,225,112,.40) 51%, transparent 64%),
        linear-gradient(255deg, transparent 0 35%, rgba(255,225,112,.14) 46%, rgba(255,225,112,.34) 51%, transparent 64%);
      opacity: .18; transform: scale(.82); filter: blur(2px);
      transition: opacity .3s ease, transform .44s cubic-bezier(.2,.75,.2,1);
    }
    .art-card::after {
      content: ''; position: absolute; inset: 0; z-index: 2; pointer-events: none;
      background:
        radial-gradient(ellipse at 50% 38%, transparent 0 38%, rgba(0,0,0,.10) 60%, rgba(0,0,0,.56) 100%),
        linear-gradient(180deg, rgba(0,0,0,.02) 38%, rgba(0,0,0,.78) 100%);
      transition: opacity .28s ease;
    }
    .art-card img {
      position: absolute; inset: 0; z-index: 1; width: 100%; height: 100%; object-fit: contain;
      object-position: 50% 100%; padding: 4px 0 0;
      filter: grayscale(1) brightness(.24) contrast(1.55)
              drop-shadow(0 0 6px rgba(255,244,180,.10))
              drop-shadow(0 18px 26px rgba(0,0,0,.72));
      opacity: .97; transform: scale(1.04);
      transition: filter .34s ease, opacity .32s ease, transform .45s cubic-bezier(.2,.75,.2,1);
    }
    .art-card .art-label {
      position: absolute; z-index: 3; left: 12px; right: 12px; bottom: 10px;
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      font-size: 13px; font-weight: 950; text-align: left;
    }
    .art-card .art-label small { color: #aeb8c8; font-size: 10px; font-weight: 800; }
    .art-card:hover,
    .art-card:focus-visible,
    .art-card.revealed {
      transform: translateY(-5px); border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(238,141,98,.15), 0 18px 34px rgba(15,23,42,.24);
    }
    .art-card:hover::before,
    .art-card:focus-visible::before,
    .art-card.revealed::before { opacity: 1; transform: scale(1); }
    .art-card:hover img,
    .art-card:focus-visible img,
    .art-card.revealed img {
      filter: brightness(1.08) saturate(1.14) contrast(1.08)
              drop-shadow(0 0 10px rgba(255,235,132,.38))
              drop-shadow(0 20px 28px rgba(0,0,0,.68));
      opacity: 1; transform: scale(1.105);
    }
    .art-card:hover::after,
    .art-card:focus-visible::after,
    .art-card.revealed::after { opacity: .62; }

  /* Skill detail */
  .skill-layout { display:grid; grid-template-columns:minmax(0, 1.16fr) minmax(360px, .84fr); gap:18px; align-items:start; }
  .visual-card, .info-card { border:1px solid var(--line); border-radius:18px; overflow:hidden; background:var(--card); }
  .visual-shell {
    height:700px; position:relative; overflow:hidden; display:grid; place-items:center;
    background:
      radial-gradient(ellipse at 50% 34%, rgba(255,253,218,.98) 0 7%, rgba(255,224,91,.96) 17%, rgba(255,178,38,.68) 30%, rgba(125,81,20,.30) 45%, transparent 61%),
      linear-gradient(105deg, transparent 0 35%, rgba(255,225,112,.10) 46%, rgba(255,225,112,.23) 51%, transparent 64%),
      linear-gradient(255deg, transparent 0 35%, rgba(255,225,112,.08) 46%, rgba(255,225,112,.20) 51%, transparent 64%),
      radial-gradient(circle at 50% 48%, #272315 0 8%, #171922 42%, #080a0f 78%);
  }
  .visual-shell::before {
    content:''; position:absolute; width:78%; height:84%; left:11%; top:1%;
    border-radius:50%;
    background:radial-gradient(ellipse, rgba(255,255,220,.58) 0 10%, rgba(255,221,86,.38) 26%, rgba(255,171,24,.17) 48%, transparent 72%);
    filter:blur(7px);
    box-shadow:inset 0 -130px 120px rgba(0,0,0,.28);
    pointer-events:none;
  }
  .visual-bg, .visual-spotlight, .visual-floor { display:none; }
  .media-stage { position:absolute; inset:0; z-index:1; display:grid; place-items:center; padding:8px 8px 54px; }
  .media-stage img, .media-stage video {
    width:100%; height:100%; object-fit:contain; object-position:50% 48%;
    filter:brightness(1.18) saturate(1.10) contrast(1.06)
           drop-shadow(0 0 12px rgba(255,233,125,.30))
           drop-shadow(0 22px 30px rgba(0,0,0,.68));
    transition:opacity .18s ease, transform .32s ease, filter .24s ease;
  }
  .visual-shell.video-mode {
    height:auto;
    min-height:0;
    aspect-ratio:16 / 9;
    background:#000;
  }
  .visual-shell.video-mode::before { display:none; }
  .visual-shell.video-mode .media-stage { padding:0; background:#000; }
  .visual-shell.video-mode .visual-caption { display:none; }
  .media-stage video {
    width:100%;
    height:100%;
    object-fit:contain;
    object-position:center;
    background:#000;
    filter:none;
    display:block;
  }
  .video-loader {
    position:absolute;
    inset:0;
    z-index:4;
    display:grid;
    place-items:center;
    background:#000;
    opacity:1;
    visibility:visible;
    transition:opacity .18s ease, visibility .18s ease;
    pointer-events:none;
  }
  .video-loader.is-hidden {
    opacity:0;
    visibility:hidden;
  }
  .video-spinner {
    position:relative;
    width:22px;
    height:22px;
  }
  .video-spinner span {
    --angle:calc(var(--i) * 30deg);
    --delay:calc(var(--i) * -0.1s);
    position:absolute;
    left:50%;
    top:50%;
    width:2px;
    height:6px;
    margin-left:-1px;
    margin-top:-3px;
    border-radius:999px;
    background:#fff;
    transform:rotate(var(--angle)) translateY(-8px);
    animation:video-spinner-fade 1.2s linear infinite;
    animation-delay:var(--delay);
  }
  @keyframes video-spinner-fade {
    0% { opacity:1; }
    100% { opacity:.12; }
  }
  @media (prefers-reduced-motion: reduce) {
    .video-spinner span { animation-duration:2.4s; }
  }
  .video-placeholder {
    position:absolute;
    inset:0;
    display:grid;
    place-items:center;
    overflow:hidden;
    background:#05070c;
  }
  .video-placeholder img {
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:contain;
    object-position:center;
    opacity:.28;
    filter:grayscale(1) brightness(.44) contrast(1.2);
  }
  .video-placeholder::after {
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(180deg,rgba(0,0,0,.18),rgba(0,0,0,.62));
  }
  .video-placeholder-message {
    position:relative;
    z-index:1;
    width:min(88%,520px);
    padding:18px 20px;
    border:1px solid rgba(255,255,255,.14);
    border-radius:14px;
    background:rgba(5,7,12,.72);
    color:#fff;
    text-align:center;
    backdrop-filter:blur(8px);
  }
  .video-placeholder-message b {
    display:block;
    margin-bottom:7px;
    font-size:16px;
  }
  .video-placeholder-message span {
    display:block;
    color:#cbd5e1;
    font-size:12px;
    line-height:1.55;
  }
  .video-placeholder-message code {
    display:inline-block;
    margin-top:9px;
    padding:5px 8px;
    border-radius:7px;
    background:rgba(255,255,255,.08);
    color:#fde68a;
    font-size:11px;
    word-break:break-all;
  }
  .visual-caption { position:absolute; z-index:3; left:18px; right:18px; bottom:14px; display:flex; align-items:center; justify-content:space-between; gap:12px; padding:11px 14px; border:1px solid rgba(255,255,255,.10); border-radius:12px; background:rgba(3,6,10,.64); backdrop-filter:blur(8px); color:#fff; }
  .visual-caption b { font-size:13px; }
  .visual-caption span { color:#cbd5e1; font-size:11px; font-weight:800; }
  .info-card {
    display:flex;
    flex-direction:column;
    min-height:700px;
  }
  .skill-layout.video-layout .info-card {
    min-height:0;
    overflow:hidden;
  }
  .skill-layout.video-layout .info-body {
    flex:1;
    min-height:0;
    overflow-y:auto;
    scrollbar-gutter:stable;
  }
  .skill-heading { padding:20px 22px 17px; border-bottom:1px solid var(--line); }
  .skill-title-row { display:flex; align-items:flex-start; justify-content:space-between; gap:14px; }
  .slot-label { font-size:14px; font-weight:950; color:var(--accent); }
  .skill-name { margin-top:4px; font-size:32px; font-weight:950; letter-spacing:-.04em; line-height:1.18; }
  .cost { flex:0 0 auto; padding:8px 13px; border:1px solid #bfdbfe; border-radius:999px; background:#eff6ff; color:#1d4ed8; font-size:14px; font-weight:950; white-space:nowrap; }
  .info-body { padding:16px 20px 18px; display:grid; gap:10px; align-content:start; }
  .summary-box { padding:15px 16px; border-left:4px solid var(--accent); border-radius:11px; background:var(--accent-soft); font-size:16px; font-weight:850; line-height:1.55; }
  .effect-list { display:grid; gap:8px; }
  .effect-item { padding:13px 14px; border:1px solid var(--line-soft); border-radius:11px; background:#f8fbff; line-height:1.55; }
  .effect-item b { display:block; margin-bottom:4px; font-size:15px; }
  .effect-item span { color:var(--muted); font-size:14px; font-weight:700; }
  .rule-note { padding:13px 14px; border:1px dashed #cbd5e1; border-radius:11px; color:var(--muted); font-size:14px; font-weight:700; line-height:1.55; background:#fcfdff; }

  [hidden] { display:none !important; }

  @media (max-width: 1180px) {
    .art-grid { grid-template-columns:repeat(3,minmax(0,1fr)); }
    .skill-layout { grid-template-columns:1fr; }
    .skill-layout.video-layout .info-card { height:auto !important; overflow:visible; }
    .skill-layout.video-layout .info-body { overflow:visible; }
    .visual-shell, .info-card { min-height:auto; height:auto; }
    .visual-shell { height:660px; }
    .info-card { min-height:0; }
  }
  @media (max-width: 860px) {
    .top-card, .character-main { flex-direction:column; align-items:flex-start; }
    .character-switcher, .skill-shortcuts { justify-content:flex-start; }
    .main-tab { flex:1 1 0; min-width:0; padding:0 16px; }
    .section-subtitle { display:none; }
  }
  @media (max-width: 640px) {
    .page { width:min(100% - 18px, 1540px); }
    .top-card { padding:14px; }
    .logo { width:54px; height:54px; font-size:14px; border-radius:16px; }
    h1 { font-size:24px; }
    .brand-sub { font-size:13px; }
    .char-btn { min-width:96px; height:44px; }
    .character-card { padding:14px 14px 0; }
    .main-tabs { margin:0 -14px; }
    .character-name { font-size:23px; }
    .portrait { width:64px; height:64px; }
    .section-titlebar { min-height:80px; padding:0 18px; }
    .section-title { font-size:19px; }
    .content-card { padding:12px; }
    .art-grid { grid-template-columns:1fr 1fr; gap:10px; }
    .skill-shortcut { width:46px; height:46px; }
    .visual-shell { height:540px; }
    .info-card { min-height:0; }
    .skill-title-row { flex-direction:column; }
  }
</style>
</head>
<body>
<main class="page">
  <header class="top-card panel">
    <div class="brand">
      <div class="logo">FILL<br>GRIM</div>
      <div>
        <h1>캐릭터 가이드</h1>
        <div class="brand-sub">일러스트와 스킬 효과를 한 페이지에서 확인합니다.</div>
      </div>
    </div>
    <div class="character-switcher">
      <button class="char-btn" data-character="mime"><span class="char-badge">MI</span><span>MIME</span></button>
      <button class="char-btn" data-character="neve"><span class="char-badge">NE</span><span>NEVE</span></button>
    </div>
  </header>

  <section class="character-card panel">
    <div class="character-main">
      <div class="character-identity">
        <div class="portrait" id="portraitWrap"><img id="characterPortrait" alt="캐릭터 프로필"></div>
        <div>
          <div class="character-title-row">
            <div class="character-name" id="characterName"></div>
            <span class="badge role" id="characterRole"></span>
            <span class="badge hp" id="characterHp"></span>
          </div>
          <p class="character-desc" id="characterDesc"></p>
        </div>
      </div>
      <div class="skill-shortcuts" id="skillShortcuts"></div>
    </div>
    <div class="main-tabs">
      <button class="main-tab" data-page="illustrations">캐릭터 일러스트</button>
      <button class="main-tab" data-page="skills">스킬 설명</button>
    </div>
  </section>

  <section class="section-titlebar" id="sectionTitlebar">
    <div class="section-heading">
      <div class="section-title" id="sectionTitle"></div>
      <div class="section-subtitle" id="sectionSubtitle"></div>
    </div>
  </section>

  <section class="content-card panel" id="illustrationsPage" hidden>
    <div class="art-grid" id="artGrid"></div>
  </section>

  <section class="content-card panel" id="skillsPage">
    <div class="skill-layout">
      <article class="visual-card">
        <div class="visual-shell">
          <div class="visual-bg"></div>
          <div class="visual-spotlight"></div>
          <div class="visual-floor"></div>
          <div class="media-stage" id="mediaStage"></div>
          <div class="visual-caption"><b id="mediaLabel"></b><span>스킬 시연 영상 자리</span></div>
        </div>
      </article>
      <article class="info-card">
        <div class="skill-heading">
          <div class="skill-title-row">
            <div>
              <div class="slot-label" id="slotLabel"></div>
              <div class="skill-name" id="skillName"></div>
            </div>
            <div class="cost" id="skillCost"></div>
          </div>
        </div>
        <div class="info-body">
          <div class="summary-box" id="skillSummary"></div>
          <div class="effect-list" id="effectList"></div>
          <div class="rule-note" id="skillNote"></div>
        </div>
      </article>
    </div>
  </section>
</main>

<script>

부여합니다.","effects":[{"title":"스택 부여","text":"상대에게 자기혐오 1스택을 부여합니다."},{"title":"지속 시간","text":"자기혐오는 기본적으로 2턴 동안 유지됩니다. 반복 사용 시 턴 유지 시간이 갱신됩니다."},{"title":"누적 운용","text":"반복해서 사용하면 기존 스택은 유지한 채 남은 지속 턴만 다시 2턴으로 돌아갑니다."}],"note":"반복 사용해 자기혐오 스택을 누적할 수 있습니다.","mediaType":"video","poster":"Assets/CARDLIST/NEVE/buff.png","fallbackImage":"Assets/CARDLIST/NEVE/buff.png","mediaMov":"Assets/VIDEOS/NEVE/seung.MOV"},"jeon":{"slot":"전","name":"독사과","cost":2,"media":"Assets/VIDEOS/NEVE/jeon.mp4","mediaLabel":"전 스킬 시연 영상","summary":"자신의 체력을 회복해 리스크를 관리하는 유지 스킬입니다.","effects":[{"title":"회복","text":"자신의 HP를 6 회복합니다."},{"title":"초과 회복","text":"최대 체력을 초과한 회복량은 사라집니다."}],"note":"체력 여유를 확보한 뒤 종언-기 스킬 콤보를 준비하면 더 안정적인 운영이 가능합니다.","mediaType":"video","poster":"Assets/CARDLIST/NEVE/standing.png","fallbackImage":"Assets/CARDLIST/NEVE/standing.png","mediaMov":"Assets/VIDEOS/NEVE/jeon.MOV"},"gyeol":{"slot":"결","name":"종언","cost":4,"media":"Assets/VIDEOS/NEVE/gyeol.mp4","mediaLabel":"결 스킬 시연 영상","summary":"기 스킬의 폭발력을 극대화하는 NEVE의 핵심 강화 스킬입니다.","effects":[{"title":"발동 비용","text":"자신의 HP를 6 소모합니다."},{"title":"강화 효과","text":"해당 턴에 사용하는 기 스킬의 자기혐오 스택당 피해를 1에서 2로 변경합니다."},{"title":"사용 조건","text":"현재 HP가 7 이상일 때만 사용할 수 있습니다."}],"note":"카드패와 승 스킬로 자기혐오를 충분히 누적한 뒤 종언과 기 스킬을 연계합니다.","mediaType":"video","poster":"Assets/CARDLIST/NEVE/ultimate.png","fallbackImage":"Assets/CARDLIST/NEVE/ultimate.png","mediaMov":"Assets/VIDEOS/NEVE/gyeol.MOV"}}}};
let currentCharacter = 'mime';
let currentPage = 'illustrations';
let currentSkill = 'gi';

const $ = (s) => document.querySelector(s);
const $$ = (s) => Array.from(document.querySelectorAll(s));

const skillOrder = ['gi','seung','jeon','gyeol'];
const skillLabelMap = { gi:'기', seung:'승', jeon:'전', gyeol:'결' };
const skillClassMap = { gi:'gi', seung:'seung', jeon:'jeon', gyeol:'gyeol' };

function renderCharacterButtons() {
  $$('.char-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.character === currentCharacter));
}

function renderCharacterCard() {
  const character = CHARACTERS[currentCharacter];
  $('#characterPortrait').src = character.profile;
  $('#characterPortrait').alt = character.name + ' 프로필';
  $('#characterName').textContent = character.name;
  $('#characterRole').textContent = character.role;
  $('#characterHp').textContent = character.hp;
  $('#characterDesc').textContent = character.desc;
  $('#portraitWrap').classList.toggle('mime', currentCharacter === 'mime');

  const shortcuts = $('#skillShortcuts');
  shortcuts.innerHTML = '';
  skillOrder.forEach(key => {
    const s = character.skills[key];
    const btn = document.createElement('button');
    btn.className = `skill-shortcut ${skillClassMap[key]} ${currentSkill === key ? 'active' : ''}`;
    btn.type = 'button';
    btn.dataset.skill = key;
    btn.innerHTML = `${skillLabelMap[key]}<small>${s.cost}</small>`;
    btn.addEventListener('click', () => { currentSkill = key; renderSkillShortcuts(); renderSkillPanel(); });
    shortcuts.appendChild(btn);
  });
}

function renderSkillShortcuts() {
  $$('.skill-shortcut').forEach(btn => btn.classList.toggle('active', btn.dataset.skill === currentSkill));
}

function renderTabs() {
  $$('.main-tab').forEach(btn => btn.classList.toggle('active', btn.dataset.page === currentPage));
  $('#illustrationsPage').hidden = currentPage !== 'illustrations';
  $('#skillsPage').hidden = currentPage !== 'skills';
  $('#skillShortcuts').hidden = currentPage !== 'skills';
  const title = currentPage === 'illustrations' ? '캐릭터 일러스트' : '스킬 설명';
  const subtitle = currentPage === 'illustrations'
    ? '스탠딩 · 공격 · 피격 · 버프 · 궁극기 연출을 미리 봅니다.'
    : '스킬 연출과 효과를 함께 확인합니다.';
  $('#sectionTitle').textContent = title;
  $('#sectionSubtitle').textContent = subtitle;
}

function renderIllustrations() {
  const character = CHARACTERS[currentCharacter];
  const grid = $('#artGrid');
  grid.innerHTML = '';
  character.gallery.forEach((item, idx) => {
    const card = document.createElement('button');
    card.type = 'button';
    card.className = 'art-card';
    card.innerHTML = `
      <img alt="${character.name} ${item.label} 일러스트" src="${item.image}">
      <span class="art-label"><span>${item.label}</span><small>${item.sub}</small></span>`;
    card.addEventListener('click', () => card.classList.toggle('revealed'));
    grid.appendChild(card);
  });
}

function renderSkillPanel() {
  const character = CHARACTERS[currentCharacter];
  const skill = character.skills[currentSkill];
  $('#slotLabel').textContent = `${skill.slot} 스킬`;
  $('#skillName').textContent = skill.name;
  $('#skillCost').textContent = `코스트 ${skill.cost}`;
  $('#skillSummary').textContent = skill.summary;
  $('#skillNote').textContent = skill.note;
  $('#mediaLabel').textContent = skill.mediaLabel;

  const visualShell = document.querySelector('.visual-shell');
  const skillLayout = document.querySelector('.skill-layout');
  const infoCard = document.querySelector('.info-card');
  const isVideo = skill.mediaType === 'video';
  visualShell.classList.toggle('video-mode', isVideo);
  skillLayout.classList.toggle('video-layout', isVideo);
  if (!isVideo) infoCard.style.height = '';

  if (isVideo) {
    const movSource = skill.mediaMov
      ? `<source src="${skill.mediaMov}" type="video/quicktime">`
      : '';

    $('#mediaStage').innerHTML = `
      <video controls autoplay muted loop playsinline preload="metadata"
             aria-label="${character.name} ${skill.mediaLabel}">
        <source src="${skill.media}" type="video/mp4">
        ${movSource}
        이 브라우저에서는 영상을 재생할 수 없습니다.
      </video>
      <div class="video-loader" role="status" aria-label="영상 불러오는 중">
        <div class="video-spinner" aria-hidden="true">
          <span style="--i:0"></span><span style="--i:1"></span>
          <span style="--i:2"></span><span style="--i:3"></span>
          <span style="--i:4"></span><span style="--i:5"></span>
          <span style="--i:6"></span><span style="--i:7"></span>
          <span style="--i:8"></span><span style="--i:9"></span>
          <span style="--i:10"></span><span style="--i:11"></span>
        </div>
      </div>`;

    const video = $('#mediaStage video');
    const showLoading = () => setVideoLoading(true);
    const hideLoading = () => setVideoLoading(false);

    ['loadstart','waiting','stalled','seeking'].forEach(eventName => {
      video.addEventListener(eventName, showLoading);
    });
    ['loadeddata','canplay','playing','seeked'].forEach(eventName => {
      video.addEventListener(eventName, hideLoading);
    });

    video.addEventListener('loadedmetadata', syncVideoInfoHeight, { once:true });
    video.addEventListener('error', () => {
      hideLoading();
      showVideoPlaceholder(character, skill);
    }, { once:true });

    showLoading();
    requestAnimationFrame(syncVideoInfoHeight);
  } else {
    $('#mediaStage').innerHTML = `<img alt="${character.name} ${skill.mediaLabel}" src="${skill.media}">`;
  }

  const list = $('#effectList');
  list.innerHTML = '';
  skill.effects.forEach(effect => {
    const item = document.createElement('div');
    item.className = 'effect-item';
    item.innerHTML = `<b>${effect.title}</b><span>${effect.text}</span>`;
    list.appendChild(item);
  });
  requestAnimationFrame(syncVideoInfoHeight);
}

function setVideoLoading(isLoading) {
  const loader = $('#mediaStage .video-loader');
  if (!loader) return;
  loader.classList.toggle('is-hidden', !isLoading);
  loader.setAttribute('aria-hidden', String(!isLoading));
}

function showVideoPlaceholder(character, skill) {
  const image = skill.fallbackImage || skill.poster || '';
  const imageMarkup = image
    ? `<img src="${image}" alt="${character.name} ${skill.mediaLabel} 준비 이미지">`
    : '';

  $('#mediaStage').innerHTML = `
    <div class="video-placeholder">
      ${imageMarkup}
      <div class="video-placeholder-message">
        <b>스킬 영상 준비 중</b>
        <span>아래 두 경로 중 하나에 영상을 업로드하면 자동으로 표시됩니다.</span>
        <code>${skill.media}</code>
        <code>${skill.mediaMov || ''}</code>
      </div>
    </div>`;

  requestAnimationFrame(syncVideoInfoHeight);
}

function syncVideoInfoHeight() {
  const visualShell = document.querySelector('.visual-shell');
  const skillLayout = document.querySelector('.skill-layout');
  const infoCard = document.querySelector('.info-card');
  if (!visualShell || !skillLayout || !infoCard) return;

  const shouldSync =
    skillLayout.classList.contains('video-layout') &&
    window.innerWidth > 1180;

  if (!shouldSync) {
    infoCard.style.height = '';
    return;
  }

  const height = Math.round(visualShell.getBoundingClientRect().height);
  infoCard.style.height = `${height}px`;
}

window.addEventListener('resize', () => requestAnimationFrame(syncVideoInfoHeight));

function setCharacter(key) {
  currentCharacter = key;
  currentSkill = 'gi';
  renderCharacterButtons();
  renderCharacterCard();
  renderTabs();
  renderIllustrations();
  renderSkillPanel();
}

$$('.char-btn').forEach(btn => btn.addEventListener('click', () => setCharacter(btn.dataset.character)));
$$('.main-tab').forEach(btn => btn.addEventListener('click', () => {
  currentPage = btn.dataset.page;
  renderTabs();

  if (currentPage === 'skills') {
    renderSkillShortcuts();
    renderSkillPanel();
  }
}));

setCharacter('mime');
</script>
</body>
</html>
